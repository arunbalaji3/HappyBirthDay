<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Photo Card</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>

    <section class="memory-page">
        <h1>Hi Nandhini!👑</h1>
        <p class="memory-sub">I realized we don't have a single photo together, But that doesn't define our friendship i guess.📸</p>

        <div class="gallery">
            <div class="polaroid">
                <img src="images/photo.jpg" alt="memory1">
                <p>Happy Birthday, Bestie! 🥳🙌</p>
            </div>
        </div>

        <button id="birthdayBtn">The Note🗒️</button>
    </section>

    <div id="lightbox" class="lightbox">
        <span class="close">❌</span>
        <img id="lightbox-img" src="" alt="Preview">
    </div>

    <script src="js/script.js"></script>
</body>
</html>
