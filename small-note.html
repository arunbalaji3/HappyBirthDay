<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Small Note</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <section class="note-page">
        <div class="note-card fade-in">
            <h1>Before You Continue...🤔</h1>
            <p>
                Every year, you'll probably receive countless birthday wishes.📱
                <br> <br>
                I could have simply sent you another message.💬
                <br> <br>
                But I wanted to make something special for my best friend.🎈
                <br> <br>
                I hope it make you smile.😁
            </p>

            <button id="continueBtn">
                Continue
            </button>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
